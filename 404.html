<!DOCTYPE html>
<html lang="pl">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="robots" content="noindex, follow" />
	<title>404 - Strona już nie istnieje | Los Gorditos</title>
	<style>
		:root {
			--orange: #ed7829;
			--black: #151515;
			--bg: #f8f4ef;
			--text: #2a2a2a;
			--muted: #666;
			--card: #ffffff;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: "Barlow", "Segoe UI", Roboto, Arial, sans-serif;
			background:
				radial-gradient(circle at 10% 10%, rgba(237, 120, 41, 0.2), transparent 38%),
				radial-gradient(circle at 90% 90%, rgba(21, 21, 21, 0.12), transparent 32%),
				var(--bg);
			color: var(--text);
		}

		.error-card {
			width: min(100%, 640px);
			background: var(--card);
			border-radius: 18px;
			border: 2px solid #f0d8c7;
			box-shadow: 0 20px 48px rgba(0, 0, 0, 0.12);
			padding: 44px 28px;
			text-align: center;
		}

		.code {
			display: inline-block;
			font-size: clamp(3rem, 11vw, 6rem);
			line-height: 1;
			font-weight: 900;
			color: var(--orange);
			letter-spacing: 0.02em;
			margin-bottom: 12px;
		}

		h1 {
			font-size: clamp(1.6rem, 3.8vw, 2.2rem);
			color: var(--black);
			margin-bottom: 12px;
		}

		p {
			font-size: 1rem;
			line-height: 1.65;
			color: var(--muted);
			max-width: 48ch;
			margin: 0 auto 28px;
		}

		.home-link {
			display: inline-block;
			padding: 12px 22px;
			border-radius: 999px;
			border: 2px solid var(--orange);
			background: var(--orange);
			color: var(--black);
			text-decoration: none;
			font-weight: 800;
			letter-spacing: 0.02em;
			transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
		}

		.home-link:hover {
			transform: translateY(-1px);
			box-shadow: 0 10px 24px rgba(237, 120, 41, 0.35);
			background: #ff8b3f;
		}

		.home-link:focus-visible {
			outline: 3px solid rgba(237, 120, 41, 0.3);
			outline-offset: 3px;
		}
	</style>
</head>
<body>
	<main class="error-card" role="main">
		<span class="code" aria-hidden="true">404</span>
		<h1>Ups! Tej strony już nie ma.</h1>
		<p>
			Link jest nieaktualny lub adres został wpisany niepoprawnie.
		</p>
		<a class="home-link" href="/">Wróć na stronę główną</a>
	</main>
</body>
</html>
